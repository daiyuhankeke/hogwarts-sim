<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lib-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a140e"/>
      <stop offset="100%" stop-color="#0d0a06"/>
    </linearGradient>
    <radialGradient id="lib-lamp" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#e8c878" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#lib-bg)"/>
  <rect width="1600" height="900" fill="url(#lib-lamp)"/>
  <!-- bookshelves -->
  <g fill="#2a1f14" opacity="0.9">
    <rect x="0" y="80" width="320" height="820"/>
    <rect x="1280" y="80" width="320" height="820"/>
    <rect x="340" y="120" width="920" height="780" opacity="0.5"/>
  </g>
  <g fill="#4a3520" opacity="0.7">
    <rect x="20" y="100" width="280" height="18" rx="1"/>
    <rect x="20" y="140" width="280" height="18" rx="1"/>
    <rect x="20" y="180" width="280" height="18" rx="1"/>
    <rect x="20" y="220" width="280" height="18" rx="1"/>
    <rect x="1300" y="100" width="280" height="18" rx="1"/>
    <rect x="1300" y="140" width="280" height="18" rx="1"/>
    <rect x="1300" y="180" width="280" height="18" rx="1"/>
  </g>
  <!-- reading table -->
  <rect x="500" y="620" width="600" height="120" rx="8" fill="#3d2a18" opacity="0.8"/>
  <ellipse cx="800" cy="600" rx="120" ry="20" fill="#e8c878" opacity="0.25"/>
</svg>
