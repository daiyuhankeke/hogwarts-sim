<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="100%" stop-color="#4a5060"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#hm-sky)"/>
  <!-- snowy village -->
  <rect x="0" y="550" width="1600" height="350" fill="#e8eef4"/>
  <g fill="#3a3540">
    <rect x="200" y="480" width="180" height="200" rx="4"/>
    <polygon points="200,480 290,380 380,480" fill="#2a2530"/>
    <rect x="600" y="500" width="220" height="180" rx="4"/>
    <polygon points="600,500 710,390 820,500" fill="#2a2530"/>
    <rect x="1000" y="470" width="200" height="210" rx="4"/>
    <polygon points="1000,470 1100,360 1200,470" fill="#2a2530"/>
  </g>
  <!-- warm window lights -->
  <g fill="#ffcc88" opacity="0.8">
    <rect x="260" y="560" width="30" height="40"/>
    <rect x="680" y="580" width="36" height="44"/>
    <rect x="1060" y="550" width="32" height="42"/>
  </g>
</svg>
