<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="60%" stop-color="#1a2038"/>
      <stop offset="100%" stop-color="#2a2840"/>
    </linearGradient>
    <radialGradient id="cr-fire" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#ff9944" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#cr-sky)"/>
  <!-- window night -->
  <rect x="600" y="120" width="400" height="280" rx="4" fill="#0a1525" stroke="#4a4030" stroke-width="6"/>
  <circle cx="800" cy="200" r="40" fill="#ddeeff" opacity="0.15"/>
  <!-- stone walls -->
  <rect x="0" y="400" width="1600" height="500" fill="#2a2420"/>
  <rect width="1600" height="900" fill="url(#cr-fire)"/>
  <!-- fireplace -->
  <rect x="680" y="520" width="240" height="200" rx="8" fill="#1a1008"/>
  <ellipse cx="800" cy="580" rx="60" ry="40" fill="#ff6622" opacity="0.7"/>
  <ellipse cx="800" cy="560" rx="40" ry="25" fill="#ffaa44" opacity="0.8"/>
  <!-- armchairs hint -->
  <ellipse cx="400" cy="720" rx="100" ry="60" fill="#740001" opacity="0.4"/>
  <ellipse cx="1200" cy="720" rx="100" ry="60" fill="#740001" opacity="0.35"/>
</svg>
