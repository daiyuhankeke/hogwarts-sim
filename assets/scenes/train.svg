<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tr-sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#3a2830"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#tr-sky)"/>
  <!-- train body -->
  <rect x="100" y="380" width="1400" height="220" rx="20" fill="#8b0000"/>
  <rect x="100" y="360" width="1400" height="40" rx="8" fill="#5a0000"/>
  <!-- windows -->
  <g fill="#ffdd99" opacity="0.75">
    <rect x="180" y="420" width="80" height="60" rx="4"/>
    <rect x="320" y="420" width="80" height="60" rx="4"/>
    <rect x="460" y="420" width="80" height="60" rx="4"/>
    <rect x="700" y="420" width="80" height="60" rx="4"/>
    <rect x="940" y="420" width="80" height="60" rx="4"/>
    <rect x="1180" y="420" width="80" height="60" rx="4"/>
  </g>
  <!-- steam -->
  <ellipse cx="80" cy="350" rx="60" ry="80" fill="#ccc" opacity="0.25"/>
  <ellipse cx="50" cy="280" rx="50" ry="70" fill="#ddd" opacity="0.15"/>
  <!-- tracks -->
  <rect x="0" y="620" width="1600" height="12" fill="#333"/>
  <rect x="0" y="650" width="1600" height="8" fill="#444"/>
</svg>
